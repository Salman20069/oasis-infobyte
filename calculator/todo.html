<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Level 2 - Task 3: To-Do Web App</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #fafafa; padding: 20px; }
        .todo-box { max-width: 500px; margin: 0 auto; background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #333; }
        .input-group { display: flex; gap: 10px; margin-bottom: 20px; }
        input[type="text"] { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px 15px; cursor: pointer; border: none; border-radius: 4px; background: #007bff; color: white; }
        button:hover { background: #0056b3; }
        ul { list-style-type: none; padding: 0; }
        li { background: #f9f9f9; padding: 10px; margin-bottom: 8px; border-left: 4px solid #007bff; display: flex; justify-content: space-between; align-items: center; border-radius: 4px; }
        .completed-tasks li { border-left-color: #28a745; text-decoration: line-through; opacity: 0.7; }
        .timestamp { font-size: 11px; color: #888; display: block; }
        .actions button { padding: 4px 8px; font-size: 12px; margin-left: 5px; background: #6c757d; }
        .actions .btn-complete { background: #28a745; }
        .actions .btn-delete { background: #dc3545; }
    </style>
</head>
<body>

<div class="todo-box">
    <h2>My To-Do App</h2>
    <div class="input-group">
        <input type="text" id="taskInput" placeholder="Add a new daily task...">
        <button onclick="addTask()">Add</button>
    </div>

    <h3>Pending Tasks</h3>
    <ul id="pendingList"></ul>

    <h3>Completed Tasks</h3>
    <ul id="completedList" class="completed-tasks"></ul>
</div>

<script>
    let tasks = [];

    function addTask() {
        const text = document.getElementById('taskInput').value.trim();
        if(!text) return;
        
        const timestamp = new Date().toLocaleString();
        tasks.push({ id: Date.now(), text, completed: false, time: timestamp });
        document.getElementById('taskInput').value = '';
        render();
    }

    function toggleComplete(id) {
        const task = tasks.find(t => t.id === id);
        if(task) task.completed = !task.completed;
        render();
    }

    function editTask(id) {
        const task = tasks.find(t => t.id === id);
        if(!task) return;
        const newText = prompt("Edit your task:", task.text);
        if(newText !== null && newText.trim() !== "") {
            task.text = newText.trim();
            render();
        }
    }

    function deleteTask(id) {
        tasks = tasks.filter(t => t.id !== id);
        render();
    }

    function render() {
        const pendingList = document.getElementById('pendingList');
        const completedList = document.getElementById('completedList');
        
        pendingList.innerHTML = '';
        completedList.innerHTML = '';

        tasks.forEach(task => {
            const li = document.createElement('li');
            li.innerHTML = `
                <div>
                    <span>${task.text}</span>
                    <span class="timestamp">Added: ${task.time}</span>
                </div>
                <div class="actions">
                    ${!task.completed ? `<button class="btn-complete" onclick="toggleComplete(${task.id})">✓</button>` : `<button onclick="toggleComplete(${task.id})">Undo</button>`}
                    <button onclick="editTask(${task.id})">Edit</button>
                    <button class="btn-delete" onclick="deleteTask(${task.id})">X</button>
                </div>
            `;
            if(task.completed) {
                completedList.appendChild(li);
            } else {
                pendingList.appendChild(li);
            }
        });
    }
</script>

</body>
</html>
